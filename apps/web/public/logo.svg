<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 32" fill="none">
  <!-- Logomark -->
  <rect width="32" height="32" rx="8" fill="#4361EE"/>
  <!-- Arrow 1: top-left → bottom-right -->
  <line x1="8" y1="8" x2="22" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M18 22 L22 22 L22 18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow 2: bottom-left → top-right -->
  <line x1="8" y1="24" x2="22" y2="10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M22 14 L22 10 L18 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark: "Xenith" -->
  <text
    x="40"
    y="22"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="18"
    font-weight="600"
    letter-spacing="-0.3"
    fill="currentColor"
  >Xen<tspan fill="#4361EE">ith</tspan></text>
</svg>
